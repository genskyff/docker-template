name: Front

on:
  pull_request:
    paths:
      - front/**
      - .github/workflows/front.yaml
  push:
    branches:
      - "**"
    paths:
      - front/**
      - .github/workflows/front.yaml

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: front

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Mise
        uses: jdx/mise-action@v4
        with:
          working_directory: front

      - name: Install packages
        run: pnpm install --frozen-lockfile

      - name: Run check
        run: pnpm check

      - name: Run build
        run: pnpm build
