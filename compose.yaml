services:
  app-server:
    build: ./server
    command: sh -c 'cargo build && cargo watch -x run'
    environment:
      - RUST_BACKTRACE=1
      - RUST_LOG=debug
    networks:
      - app-network
    ports:
      - 3001:3001
    stdin_open: true
    tty: true
    volumes:
      - ./server:/app-server:cached
      - cargo-registry:/usr/local/cargo/registry
      - rust-target:/app-server/target

  app-front:
    build: ./front
    command: sh -c 'bun install && bun x rsbuild dev --host 0.0.0.0'
    depends_on:
      - app-server
    environment:
      - DOCKER_ENV=true
      - NODE_ENV=development
    networks:
      - app-network
    ports:
      - 3000:3000
    stdin_open: true
    tty: true
    volumes:
      - ./front:/app-front:cached
      - node-modules:/app-front/node_modules

networks:
  app-network:

volumes:
  cargo-registry:
  rust-target:
  node-modules:
